<style>
  #fano-tictactoe {
    --fano-text: #142943;
    --fano-muted: #667085;
    --fano-line: #a9afb8;
    --fano-border: #d8dee7;
    --fano-background: #ffffff;
    --fano-hover: #f2f4f7;
    --fano-win-background: #e2f0e5;
    --fano-win-line: #4f9462;

    box-sizing: border-box;
    width: min(100%, 650px);
    margin: 1.5rem auto;
    padding: 2rem;
    border: 1px solid var(--fano-border);
    border-radius: 20px;
    background: var(--fano-background);
    color: var(--fano-text);
  }

  #fano-tictactoe *,
  #fano-tictactoe *::before,
  #fano-tictactoe *::after {
    box-sizing: border-box;
  }

  #fano-tictactoe h3 {
    margin: 0 0 0.5rem;
    color: var(--fano-text);
    font-size: 1.4rem;
  }

  #fano-tictactoe .fano-description {
    margin: 0 0 1rem;
    color: var(--fano-muted);
    line-height: 1.6;
  }

  /*
   * The explicit square aspect ratio prevents a site theme
   * from stretching the SVG horizontally or vertically.
   */
  #fano-tictactoe svg.fano-board {
    display: block !important;

    width: min(100%, 430px) !important;
    max-width: 430px !important;
    min-width: 0 !important;

    height: auto !important;
    min-height: 0 !important;
    max-height: none !important;

    aspect-ratio: 1 / 1 !important;

    margin: 0.5rem auto 1rem;
    padding: 0 !important;

    overflow: visible;
  }

  #fano-tictactoe .fano-line {
    fill: none;
    stroke: var(--fano-line);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;

    vector-effect: non-scaling-stroke;

    transition:
      stroke 180ms ease,
      stroke-width 180ms ease;
  }

  #fano-tictactoe .fano-line.is-winning {
    stroke: var(--fano-win-line);
    stroke-width: 4;
  }

  #fano-tictactoe .fano-point {
    cursor: pointer;
    outline: none;
  }

  #fano-tictactoe .fano-point circle {
    fill: var(--fano-background);
    stroke: var(--fano-text);
    stroke-width: 2.5;

    vector-effect: non-scaling-stroke;

    transform-box: fill-box;
    transform-origin: center;

    transition:
      fill 150ms ease,
      stroke 150ms ease,
      transform 150ms ease;
  }

  #fano-tictactoe .fano-point:hover circle,
  #fano-tictactoe .fano-point:focus-visible circle {
    fill: var(--fano-hover);
    transform: scale(1.07);
  }

  #fano-tictactoe .fano-point.is-winning circle {
    fill: var(--fano-win-background);
    stroke: var(--fano-win-line);
    stroke-width: 3;
  }

  #fano-tictactoe .fano-mark {
    fill: var(--fano-text);

    font-family:
      ui-sans-serif,
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;

    font-size: 27px;
    font-weight: 650;

    text-anchor: middle;
    dominant-baseline: central;

    pointer-events: none;
    user-select: none;
  }

  #fano-tictactoe .fano-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;

    margin-top: 0.5rem;
  }

  #fano-tictactoe .fano-status {
    min-height: 1.5em;
    margin: 0;

    color: var(--fano-text);
    font-weight: 650;
  }

  #fano-tictactoe .fano-reset {
    appearance: none;

    border: none;
    border-radius: 999px;

    padding: 0.7rem 1.25rem;

    background: var(--fano-text);
    color: #ffffff;

    font: inherit;
    font-size: 0.93rem;
    font-weight: 650;
    line-height: 1;

    cursor: pointer;

    transition:
      opacity 140ms ease,
      transform 140ms ease;
  }

  #fano-tictactoe .fano-reset:hover {
    opacity: 0.86;
    transform: translateY(-1px);
  }

  #fano-tictactoe .fano-reset:active {
    transform: translateY(0);
  }

  #fano-tictactoe .fano-reset:focus-visible {
    outline: 3px solid rgba(20, 41, 67, 0.22);
    outline-offset: 3px;
  }

  @media (max-width: 480px) {
    #fano-tictactoe {
      padding: 1.2rem;
    }

    #fano-tictactoe .fano-footer {
      align-items: flex-start;
      flex-direction: column;
    }
  }

  @media (prefers-color-scheme: dark) {
    #fano-tictactoe {
      --fano-text: #edf2f7;
      --fano-muted: #b4bbc5;
      --fano-line: #747b86;
      --fano-border: #444b55;
      --fano-background: #20242a;
      --fano-hover: #30363d;
      --fano-win-background: #294c34;
      --fano-win-line: #74b985;
    }
  }
</style>

<div id="fano-tictactoe">
  <h3>Fano Tic-Tac-Toe</h3>

  <p class="fano-description">
    Take turns choosing points. The first player to occupy a projective
    line wins.
  </p>

  <svg
    class="fano-board"
    viewBox="0 0 400 400"
    width="400"
    height="400"
    preserveAspectRatio="xMidYMid meet"
    role="img"
    aria-label="Interactive Fano plane tic-tac-toe board"
  >
    <g class="fano-lines"></g>
    <g class="fano-points"></g>
  </svg>

  <div class="fano-footer">
    <p class="fano-status" aria-live="polite">
      O's turn
    </p>

    <button class="fano-reset" type="button">
      New game
    </button>
  </div>
</div>

<script>
(() => {
  const game = document.getElementById("fano-tictactoe");

  if (!game || game.dataset.initialized === "true") {
    return;
  }

  game.dataset.initialized = "true";

  const svgNamespace = "http://www.w3.org/2000/svg";

  const lineLayer = game.querySelector(".fano-lines");
  const pointLayer = game.querySelector(".fano-points");
  const status = game.querySelector(".fano-status");
  const resetButton = game.querySelector(".fano-reset");

  /*
   * Equilateral triangle:
   *
   * top          = (200, 50)
   * bottom left  = (50, 309.8076)
   * bottom right = (350, 309.8076)
   *
   * Its side length is 300.
   * Its height is 150 sqrt(3) ≈ 259.8076.
   *
   * Points 4, 5, 6 are the side midpoints.
   * Point 7 is the centroid.
   */
  const points = [
    {
      id: 1,
      x: 200,
      y: 50
    },
    {
      id: 2,
      x: 50,
      y: 309.8076
    },
    {
      id: 3,
      x: 350,
      y: 309.8076
    },

    {
      id: 4,
      x: 200,
      y: 309.8076
    },
    {
      id: 5,
      x: 125,
      y: 179.9038
    },
    {
      id: 6,
      x: 275,
      y: 179.9038
    },

    {
      id: 7,
      x: 200,
      y: 223.2051
    }
  ];

  /*
   * The seven projective lines of PG(2,2).
   *
   * The first six are drawn as straight segments.
   * The final line {4,5,6} is drawn as a circle.
   */
  const projectiveLines = [
    {
      ids: [1, 2, 5],
      kind: "segment"
    },
    {
      ids: [1, 3, 6],
      kind: "segment"
    },
    {
      ids: [2, 3, 4],
      kind: "segment"
    },
    {
      ids: [1, 4, 7],
      kind: "segment"
    },
    {
      ids: [2, 6, 7],
      kind: "segment"
    },
    {
      ids: [3, 5, 7],
      kind: "segment"
    },
    {
      ids: [4, 5, 6],
      kind: "circle"
    }
  ];

  /*
   * The circle is centered at the centroid.
   *
   * Its radius is the distance from the centroid
   * to any side midpoint:
   *
   * 50 sqrt(3) ≈ 86.6025.
   */
  const innerCircle = {
    cx: 200,
    cy: 223.2051,
    r: 86.6025
  };

  let board = {};
  let currentPlayer = "O";
  let gameOver = false;
  let winningLineIndex = null;

  function createSvgElement(tag, attributes = {}) {
    const element = document.createElementNS(
      svgNamespace,
      tag
    );

    Object.entries(attributes).forEach(([name, value]) => {
      element.setAttribute(name, String(value));
    });

    return element;
  }

  function getPoint(id) {
    return points.find(point => point.id === id);
  }

  function getExtremePoints(ids) {
    const candidates = ids.map(getPoint);

    let start = candidates[0];
    let end = candidates[1];
    let maximumSquaredDistance = -1;

    for (let i = 0; i < candidates.length; i++) {
      for (let j = i + 1; j < candidates.length; j++) {
        const dx = candidates[i].x - candidates[j].x;
        const dy = candidates[i].y - candidates[j].y;

        const squaredDistance = dx * dx + dy * dy;

        if (squaredDistance > maximumSquaredDistance) {
          maximumSquaredDistance = squaredDistance;
          start = candidates[i];
          end = candidates[j];
        }
      }
    }

    return {
      start,
      end
    };
  }

  function drawLines() {
    lineLayer.innerHTML = "";

    projectiveLines.forEach((line, index) => {
      let shape;

      if (line.kind === "circle") {
        shape = createSvgElement("circle", {
          cx: innerCircle.cx,
          cy: innerCircle.cy,
          r: innerCircle.r,
          class: "fano-line"
        });
      } else {
        const { start, end } = getExtremePoints(line.ids);

        shape = createSvgElement("line", {
          x1: start.x,
          y1: start.y,
          x2: end.x,
          y2: end.y,
          class: "fano-line"
        });
      }

      shape.dataset.lineIndex = String(index);
      lineLayer.appendChild(shape);
    });
  }

  function drawPoints() {
    pointLayer.innerHTML = "";

    points.forEach(point => {
      const mark = board[point.id] || "";

      const group = createSvgElement("g", {
        class: "fano-point",
        tabindex: "0",
        role: "button",
        "aria-label": mark
          ? `Point occupied by ${mark}`
          : "Empty point"
      });

      group.dataset.pointId = String(point.id);

      if (
        winningLineIndex !== null &&
        projectiveLines[winningLineIndex].ids.includes(point.id)
      ) {
        group.classList.add("is-winning");
      }

      const circle = createSvgElement("circle", {
        cx: point.x,
        cy: point.y,
        r: 23
      });

      const text = createSvgElement("text", {
        x: point.x,
        y: point.y,
        class: "fano-mark"
      });

      text.textContent = mark;

      group.append(circle, text);

      group.addEventListener("click", () => {
        play(point.id);
      });

      group.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          play(point.id);
        }
      });

      pointLayer.appendChild(group);
    });
  }

  function updateWinningLine() {
    const lines = lineLayer.querySelectorAll(".fano-line");

    lines.forEach(line => {
      line.classList.remove("is-winning");
    });

    if (winningLineIndex === null) {
      return;
    }

    const winningShape = lineLayer.querySelector(
      `[data-line-index="${winningLineIndex}"]`
    );

    if (winningShape) {
      winningShape.classList.add("is-winning");
    }
  }

  function findWinningLine(player) {
    return projectiveLines.findIndex(line =>
      line.ids.every(id => board[id] === player)
    );
  }

  function play(pointId) {
    if (gameOver || board[pointId]) {
      return;
    }

    board[pointId] = currentPlayer;

    const foundLineIndex = findWinningLine(currentPlayer);

    if (foundLineIndex !== -1) {
      winningLineIndex = foundLineIndex;
      gameOver = true;

      status.textContent = `${currentPlayer} wins!`;
    } else if (
      Object.keys(board).length === points.length
    ) {
      gameOver = true;
      status.textContent = "Draw.";
    } else {
      currentPlayer =
        currentPlayer === "O"
          ? "X"
          : "O";

      status.textContent = `${currentPlayer}'s turn`;
    }

    drawPoints();
    updateWinningLine();
  }

  function resetGame() {
    board = {};
    currentPlayer = "O";
    gameOver = false;
    winningLineIndex = null;

    status.textContent = "O's turn";

    drawPoints();
    updateWinningLine();
  }

  resetButton.addEventListener("click", resetGame);

  drawLines();
  drawPoints();
})();
</script>
